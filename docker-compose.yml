services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acra
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/acra
      JWT_SECRET: change-me-in-production
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:3000
      # ANTHROPIC_API_KEY: set to enable AI review + docs generation
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
